version: '3.9'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: landlitigation
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      DEBUG: '1'
      DJANGO_SECRET_KEY: change-me
      USE_MYSQL: '1'
      MYSQL_DATABASE: landlitigation
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_HOST: db
      MYSQL_PORT: '3306'
    ports:
      - '8000:8000'
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mysql_data:
